<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>GraphPilot Jac</title>
  <link rel='stylesheet' href='/app/styles.css'>
</head>
<body>
  <main class='wrap'>
    <header>
      <h1>GraphPilot Jac</h1>
      <p>Final Submission: Jac-first agentic research and action workspace.</p>
    </header>
    <section class='card'>
      <label>Goal</label>
      <textarea id='goal' placeholder='Example: Build a 2-week launch plan for a social impact student project.'></textarea>
      <label>Scenario</label>
      <select id='scenario'>
        <option value='research'>Research Assistant</option>
        <option value='planning'>Personal Planning</option>
        <option value='fintech'>Fintech Workflow</option>
      </select>
      <button id='run'>Run GraphPilot Agents</button>
      <p id='status' class='status'>Idle.</p>
    </section>

    <section class='grid'>
      <article class='card'><h3>Agent Activity</h3><pre id='activity'>No runs yet.</pre></article>
      <article class='card'><h3>Graph Visualization</h3><div id='graph-viz' style='height: 400px; background: #07101f; border-radius: 8px;'></div></article>
    </section>

    <section class='grid'>
      <article class='card'><h3>Tool Artifacts</h3><pre id='artifacts'>Artifacts will appear here.</pre></article>
      <article class='card'><h3>Graph Metrics</h3><pre id='metrics'>Metrics will appear here.</pre></article>
    </section>
    <script src='https://unpkg.com/vis-network/standalone/umd/vis-network.min.js'></script>
    <script src='/app/main.js'></script>

    <section class='card'><h3>Final Result</h3><pre id='summary'>Run a goal to generate final summary.</pre></section>
  </main>
  <script src='/app/main.js'></script>
</body>
</html>
